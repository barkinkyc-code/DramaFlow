<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f1c3f">
<title>Firmalar — Drama Makine</title>
<link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="app-shell">
  <div class="topbar">
    <div class="topbar-title">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Firmalar
    </div>
    <div class="topbar-actions">
      <button class="btn btn-ghost btn-sm" id="add-btn" onclick="openAddModal()" style="display:none">+ Ekle</button>
    </div>
  </div>

  <div class="page-content">
    <div class="search-wrap mt-12 mb-12">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="firm-search" placeholder="Firma ara..." oninput="renderList()">
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <button class="btn btn-ghost btn-sm" id="fav-filter-btn" onclick="toggleFavFilter()">★ Favoriler</button>
    </div>
    <div id="company-list"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item" onclick="location.href='panel.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Panel
    </button>
    <button class="nav-item" onclick="location.href='plan.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Plan
    </button>
    <button class="nav-item active" onclick="location.href='companies.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Firmalar
    </button>
  </nav>
</div>

<div id="toast"></div>

<!-- Add Modal -->
<div id="add-modal" class="modal-bg hidden">
  <div class="modal-box">
    <div class="modal-title">Yeni Firma Ekle</div>
    <div class="field-group mb-12"><label>Firma Adı</label><input type="text" id="new-name" placeholder="Firma A.Ş."></div>
    <div class="field-group mb-12"><label>Adres</label><input type="text" id="new-addr" placeholder="İlçe, Şehir"></div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <div class="field-group" style="flex:1"><label>Enlem</label><input type="number" id="new-lat" placeholder="40.1826" step="0.0001"></div>
      <div class="field-group" style="flex:1"><label>Boylam</label><input type="number" id="new-lng" placeholder="29.0614" step="0.0001"></div>
    </div>
    <div class="flex gap-8">
      <button class="btn btn-ghost w-full" onclick="closeAddModal()">İptal</button>
      <button class="btn btn-primary w-full" onclick="addCompany()">Kaydet</button>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script>
let session, showFavOnly = false;

function init() {
  session = requireAuth();
  if (!session) return;
  if (session.role === 'admin') document.getElementById('add-btn').style.display = 'inline-flex';
  renderList();
}

function toggleFavFilter() {
  showFavOnly = !showFavOnly;
  document.getElementById('fav-filter-btn').className = 'btn btn-sm ' + (showFavOnly ? 'btn-primary' : 'btn-ghost');
  renderList();
}

function renderList() {
  const q = (document.getElementById('firm-search').value || '').toLowerCase();
  const favs = getFavorites();
  let companies = getCompanies();
  if (q) companies = companies.filter(c => c.name.toLowerCase().includes(q) || c.address.toLowerCase().includes(q));
  if (showFavOnly) companies = companies.filter(c => favs.includes(c.id));
  companies.sort((a, b) => (favs.includes(b.id) ? 1 : 0) - (favs.includes(a.id) ? 1 : 0));

  const list = document.getElementById('company-list');
  list.innerHTML = '';
  companies.forEach(c => {
    const isFav = favs.includes(c.id);
    const el = document.createElement('div');
    el.className = 'company-item' + (isFav ? ' fav' : '');
    el.innerHTML = `
      <div style="flex:1;min-width:0;">
        <div class="company-name">${c.name}</div>
        <div class="company-addr">${c.address}</div>
        <div class="company-addr" style="margin-top:2px;opacity:0.6;">${c.lat.toFixed(4)}, ${c.lng.toFixed(4)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
        <span style="font-size:22px;cursor:pointer;color:${isFav?'#f59e0b':'#475569'}" onclick="event.stopPropagation();favToggle('${c.id}')">★</span>
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openMap(${c.lat},${c.lng})">Harita</button>
      </div>
    `;
    list.appendChild(el);
  });
  if (companies.length === 0) list.innerHTML = '<div class="info-banner">Sonuç bulunamadı.</div>';
}

function favToggle(id) { toggleFavorite(id); renderList(); }
function openMap(lat, lng) { window.open(`https://www.google.com/maps?q=${lat},${lng}`, '_blank'); }
function openAddModal() { document.getElementById('add-modal').classList.remove('hidden'); }
function closeAddModal() { document.getElementById('add-modal').classList.add('hidden'); }

function addCompany() {
  const name = document.getElementById('new-name').value.trim();
  const addr = document.getElementById('new-addr').value.trim();
  const lat = parseFloat(document.getElementById('new-lat').value);
  const lng = parseFloat(document.getElementById('new-lng').value);
  if (!name || !addr || isNaN(lat) || isNaN(lng)) { showToast('Tüm alanları doldurun!'); return; }
  const companies = getCompanies();
  companies.push({ id: 'c_' + Date.now(), name, address: addr, lat, lng });
  DB.set('companies', companies);
  closeAddModal();
  renderList();
  showToast('Firma eklendi ✓');
}

init();
</script>
</body>
</html>
