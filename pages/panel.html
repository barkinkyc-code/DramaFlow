<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f1c3f">
<title>Panel — Drama Makine</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
<div class="app-shell">
  <div class="topbar">
    <div class="topbar-title">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 3h15l4 8H5L1 3z"/><circle cx="7" cy="19" r="2"/><circle cx="17" cy="19" r="2"/></svg>
      Panel
    </div>
    <div class="topbar-actions">
      <span id="top-plate" class="badge badge-blue"></span>
      <button class="btn-icon" onclick="doLogout()" title="Çıkış">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div id="gps-bar" class="gps-bar off">○ GPS kapalı</div>

  <div class="page-content">

    <!-- Aktif Teslimat Kartı -->
    <div id="active-stop-section" class="hidden mt-12">
      <div class="section-head">
        <span class="section-title">Aktif Teslimat</span>
        <span class="badge badge-yellow"><span class="dot dot-yellow"></span> Yolda</span>
      </div>
      <div id="active-stop-card" class="stop-card stop-card-active fade-in">
        <div class="stop-header">
          <div>
            <div class="stop-name" id="as-name"></div>
            <div class="stop-addr">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <span id="as-addr"></span>
            </div>
            <div class="mt-8 flex gap-8 items-center">
              <span class="badge badge-yellow" id="as-eta">ETA hesaplanıyor...</span>
              <span class="text-muted text-small" id="as-time"></span>
            </div>
          </div>
        </div>
        <div id="mini-map"></div>
        <div class="stop-actions mt-12">
          <button class="btn btn-ghost btn-sm" onclick="openNavigation()" style="flex:1">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
            Navigasyona Aç
          </button>
          <button class="btn btn-success btn-sm" onclick="confirmDelivered()" style="flex:1">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            Teslim Edildi
          </button>
        </div>
      </div>
    </div>

    <!-- Bekleyen Firmalar -->
    <div class="mt-16">
      <div class="section-head">
        <span class="section-title">Bekleyen Firmalar</span>
        <span id="pending-count" class="badge badge-gray">0</span>
      </div>
      <div id="pending-list"></div>
      <div id="no-pending" class="info-banner hidden">Bugün için bekleyen firma yok. Yeni plan oluşturun.</div>
    </div>

    <!-- Tamamlanan -->
    <div class="mt-16 mb-16">
      <div class="section-head">
        <span class="section-title">Tamamlanan</span>
        <span id="done-count" class="badge badge-green">0</span>
      </div>
      <div id="done-list"></div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="location.href='panel.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Panel
    </button>
    <button class="nav-item" onclick="location.href='plan.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      Plan
    </button>
    <button class="nav-item" onclick="location.href='companies.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Firmalar
    </button>
    <button class="nav-item" id="stats-nav" onclick="location.href='stats.html'" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      İstatistik
    </button>
  </nav>
</div>

<div id="toast"></div>

<!-- Teslim Onay Modal -->
<div id="confirm-modal" class="modal-bg hidden">
  <div class="modal-box">
    <div class="modal-title">Teslim edildi olarak işaretle?</div>
    <p class="text-muted mb-16">Bu işlem geri alınamaz. Müşteri takip linki pasif hale gelecek.</p>
    <div class="flex gap-8">
      <button class="btn btn-ghost w-full" onclick="closeModal()">İptal</button>
      <button class="btn btn-success w-full" onclick="doDelivered()">Evet, Teslim Edildi</button>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/gps.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let session, route, miniMap, miniMarker, miniRouteLine;

function init() {
  session = requireAuth();
  if (!session) return;
  document.getElementById('top-plate').textContent = session.plate || session.name;
  if (session.role === 'admin') document.getElementById('stats-nav').style.display = 'flex';
  loadRoute();
}

function loadRoute() {
  route = getActiveRoute(session.id);
  if (!route) {
    // Bugün için rota var mı kontrol et
    const today = new Date().toDateString();
    const routes = getRoutes();
    route = routes.find(r => r.driverId === session.id && new Date(r.date).toDateString() === today) || null;
  }
  renderPanel();
}

function renderPanel() {
  const pendingList = document.getElementById('pending-list');
  const doneList = document.getElementById('done-list');
  const noPending = document.getElementById('no-pending');
  pendingList.innerHTML = '';
  doneList.innerHTML = '';

  if (!route || !route.stops || route.stops.length === 0) {
    noPending.classList.remove('hidden');
    document.getElementById('pending-count').textContent = '0';
    document.getElementById('done-count').textContent = '0';
    document.getElementById('active-stop-section').classList.add('hidden');
    return;
  }
  noPending.classList.add('hidden');

  const pending = route.stops.filter(s => s.status === 'pending');
  const active = route.stops.find(s => s.status === 'active');
  const done = route.stops.filter(s => s.status === 'done');

  document.getElementById('pending-count').textContent = pending.length;
  document.getElementById('done-count').textContent = done.length;

  // Aktif teslimat
  if (active) {
    showActiveStop(active);
    if (!GPS.activeStopId) {
      startGPSBroadcast(active.id, (lat, lng) => updateMiniMap(lat, lng, active));
    }
  } else {
    document.getElementById('active-stop-section').classList.add('hidden');
    stopGPSBroadcast();
  }

  // Bekleyen firmalar
  pending.forEach(stop => {
    const el = document.createElement('div');
    el.className = 'stop-card stop-card-pending fade-in';
    el.innerHTML = `
      <div class="stop-header">
        <div>
          <div class="stop-name">${stop.companyName}</div>
          <div class="stop-addr"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${stop.address}</div>
        </div>
        <div class="stop-order">${stop.order}</div>
      </div>
      <button class="btn btn-primary w-full mt-12" onclick="startDelivery('${stop.id}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        Buraya Yola Çıktım
      </button>
    `;
    pendingList.appendChild(el);
  });

  // Tamamlanan firmalar
  done.forEach(stop => {
    const el = document.createElement('div');
    el.className = 'stop-card stop-card-done fade-in';
    el.innerHTML = `
      <div class="stop-header">
        <div>
          <div class="stop-name" style="text-decoration:line-through;opacity:0.6">${stop.companyName}</div>
          <div class="stop-addr">${stop.address}</div>
        </div>
        <span class="badge badge-green">✓ Teslim ${fmt(stop.deliveredAt)}</span>
      </div>
    `;
    doneList.appendChild(el);
  });
}

function showActiveStop(stop) {
  document.getElementById('active-stop-section').classList.remove('hidden');
  document.getElementById('as-name').textContent = stop.companyName;
  document.getElementById('as-addr').textContent = stop.address;
  document.getElementById('as-time').textContent = 'Çıkış: ' + fmt(stop.startedAt);

  // Mini harita
  if (!miniMap) {
    miniMap = L.map('mini-map', { zoomControl: false, attributionControl: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(miniMap);
  }
  const destIcon = L.divIcon({ html: '<div style="width:14px;height:14px;background:#ef4444;border:2px solid white;border-radius:50%;"></div>', iconSize: [14, 14], iconAnchor: [7, 7] });
  L.marker([stop.lat, stop.lng], { icon: destIcon }).addTo(miniMap);
  miniMap.setView([stop.lat, stop.lng], 13);

  updateETADisplay(stop);
}

async function updateETADisplay(stop) {
  const coords = GPS.getCoords();
  if (!coords) return;
  const eta = await getETA(coords.lat, coords.lng, stop.lat, stop.lng);
  if (eta) document.getElementById('as-eta').textContent = 'ETA: ' + eta.arrive + ' (~' + eta.mins + ' dk)';
  updateMiniMap(coords.lat, coords.lng, stop, eta);
}

function updateMiniMap(lat, lng, stop, eta) {
  if (!miniMap) return;
  const driverIcon = L.divIcon({ html: '<div style="width:16px;height:16px;background:#3b82f6;border:2px solid white;border-radius:50%;"></div>', iconSize: [16, 16], iconAnchor: [8, 8] });
  if (miniMarker) miniMarker.setLatLng([lat, lng]);
  else miniMarker = L.marker([lat, lng], { icon: driverIcon }).addTo(miniMap);
  miniMap.setView([(lat + stop.lat) / 2, (lng + stop.lng) / 2]);
  if (eta && eta.coords && miniRouteLine) miniMap.removeLayer(miniRouteLine);
  if (eta && eta.coords) {
    const pts = eta.coords.map(c => [c[1], c[0]]);
    miniRouteLine = L.polyline(pts, { color: '#3b82f6', weight: 3 }).addTo(miniMap);
  }
  if (eta) document.getElementById('as-eta').textContent = 'ETA: ' + eta.arrive + ' (~' + eta.mins + ' dk)';
}

async function startDelivery(stopId) {
  const activeExists = route.stops.find(s => s.status === 'active');
  if (activeExists) { showToast('Önce aktif teslimatı tamamlayın!'); return; }

  const stop = route.stops.find(s => s.id === stopId);
  if (!stop) return;

  stop.status = 'active';
  stop.startedAt = new Date().toISOString();
  stop.trackToken = generateToken();
  saveRoute(route);

  showToast('Yola çıkıldı! Mail gönderiliyor...');

  // GPS başlat
  startGPSBroadcast(stop.id, (lat, lng) => updateMiniMap(lat, lng, stop));

  // ETA hesapla
  let eta = null;
  const coords = GPS.getCoords();
  if (coords) eta = await getETA(coords.lat, coords.lng, stop.lat, stop.lng);

  // Mail gönder
  await sendNotificationMail(stop, route.plate, session.name, eta);
  showToast('Mail gönderildi: ' + APP_CONFIG.notifyEmail, 3000);

  renderPanel();
}

function openNavigation() {
  const active = route && route.stops.find(s => s.status === 'active');
  if (!active) return;
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const url = isIOS
    ? `maps://maps.apple.com/?daddr=${active.lat},${active.lng}`
    : `https://www.google.com/maps/dir/?api=1&destination=${active.lat},${active.lng}&travelmode=driving`;
  window.open(url, '_blank');
}

let pendingDeliveredId = null;
function confirmDelivered() {
  const active = route && route.stops.find(s => s.status === 'active');
  if (!active) return;
  pendingDeliveredId = active.id;
  document.getElementById('confirm-modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('confirm-modal').classList.add('hidden'); }

function doDelivered() {
  closeModal();
  const stop = route.stops.find(s => s.id === pendingDeliveredId);
  if (!stop) return;
  stop.status = 'done';
  stop.deliveredAt = new Date().toISOString();
  stopGPSBroadcast();
  saveRoute(route);
  showToast('Teslim edildi olarak kaydedildi! ✓', 3000);
  renderPanel();
}

init();
</script>
</body>
</html>
